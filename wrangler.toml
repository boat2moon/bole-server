name = "bole-server"
main = "src/index.ts"
compatibility_date = "2024-12-30"

# Durable Objects 绑定（用于管理 WebSocket 会话状态）
[durable_objects]
bindings = [
  { name = "REALTIME_SESSION", class_name = "RealtimeSession" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RealtimeSession"]

# 环境变量占位（部署时通过 wrangler secret 设置）
[vars]
# DOUBAO_API_KEY = "通过 wrangler secret put DOUBAO_API_KEY 设置"
# SESSION_SECRET = "用于验证 JWT token 的密钥"
